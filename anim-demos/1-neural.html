<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MIR ACADEMY — Neural Network</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#e0dcd0;font-family:system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
.hero{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#7ad9c8;margin-bottom:22px}
.title{font-family:'Playfair Display',serif;font-size:clamp(52px,8vw,96px);font-weight:900;line-height:.95}
.title .g{color:#c8a96e}
.sub{font-family:'Cinzel',serif;font-size:clamp(13px,1.8vw,17px);color:#c8a96e;letter-spacing:.22em;margin-top:14px;opacity:.85}
.tag{position:fixed;top:18px;left:20px;z-index:20;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:#7ad9c8;text-transform:uppercase}
.back{position:fixed;top:18px;right:20px;z-index:20;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:#666;text-decoration:none}
.back:hover{color:#c8a96e}
</style></head><body>
<div class="tag">01 · Neural Network</div>
<a class="back" href="index.html">← all demos</a>
<canvas id="c"></canvas>
<div class="hero">
  <div class="eyebrow">Istanbul · 2020 · AI-Powered Education</div>
  <div class="title"><span class="g">MIR</span><br>ACADEMY</div>
  <div class="sub">AD ASTRA PER ASPERA</div>
</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,nodes,signals;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;init()}
function init(){
  const n=Math.min(90,Math.floor(W*H/16000));
  nodes=[];for(let i=0;i<n;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.6+1});
  signals=[];
}
const LINK=130;
function step(){
  x.clearRect(0,0,W,H);
  // edges
  for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
    if(d<LINK){const o=(1-d/LINK)*.32;x.strokeStyle='rgba(122,217,200,'+o+')';x.lineWidth=.6;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();
      if(Math.random()<0.0009)signals.push({a,b,t:0});}
  }}
  // signals
  for(let k=signals.length-1;k>=0;k--){const s=signals[k];s.t+=.025;if(s.t>=1){signals.splice(k,1);continue;}
    const px=s.a.x+(s.b.x-s.a.x)*s.t,py=s.a.y+(s.b.y-s.a.y)*s.t;
    x.fillStyle='rgba(226,196,138,'+(1-Math.abs(s.t-.5)*2)+')';x.beginPath();x.arc(px,py,2.4,0,7);x.fill();}
  // nodes
  for(const p of nodes){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    x.fillStyle='rgba(200,169,110,.9)';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill();
    x.fillStyle='rgba(200,169,110,.08)';x.beginPath();x.arc(p.x,p.y,p.r*4,0,7);x.fill();}
  requestAnimationFrame(step);
}
addEventListener('resize',rs);rs();step();
</script></body></html>
