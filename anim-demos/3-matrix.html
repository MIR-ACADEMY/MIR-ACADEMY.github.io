<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MIR ACADEMY — Data Rain</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#e0dcd0;font-family:system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
.hero{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.hero::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 45% at 50% 50%,rgba(5,5,5,.85) 0%,rgba(5,5,5,.4) 50%,transparent 75%);z-index:-1}
.eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#7ad9c8;margin-bottom:22px}
.title{font-family:'Playfair Display',serif;font-size:clamp(52px,8vw,96px);font-weight:900;line-height:.95}
.title .g{color:#c8a96e}
.sub{font-family:'Cinzel',serif;font-size:clamp(13px,1.8vw,17px);color:#c8a96e;letter-spacing:.22em;margin-top:14px;opacity:.85}
.tag{position:fixed;top:18px;left:20px;z-index:20;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:#7ad9c8;text-transform:uppercase}
.back{position:fixed;top:18px;right:20px;z-index:20;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:#666;text-decoration:none}
.back:hover{color:#c8a96e}
</style></head><body>
<div class="tag">03 · Data Rain</div>
<a class="back" href="index.html">← all demos</a>
<canvas id="c"></canvas>
<div class="hero">
  <div class="eyebrow">Istanbul · 2020 · AI-Powered Education</div>
  <div class="title"><span class="g">MIR</span><br>ACADEMY</div>
  <div class="sub">AD ASTRA PER ASPERA</div>
</div>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
let W,H,cols,drops,FS=16;
const glyphs='01<>{}[]/=+*MIRACDEMYアカデミー10110100∑λπ';
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;cols=Math.floor(W/FS);drops=Array(cols).fill(0).map(()=>Math.random()*-H/FS);}
function step(){
  x.fillStyle='rgba(5,5,5,.08)';x.fillRect(0,0,W,H);
  x.font=FS+'px monospace';
  for(let i=0;i<cols;i++){
    const ch=glyphs[Math.floor(Math.random()*glyphs.length)];
    const y=drops[i]*FS;
    x.fillStyle='rgba(226,196,138,.95)';x.fillText(ch,i*FS,y);
    x.fillStyle='rgba(122,217,200,.25)';x.fillText(glyphs[Math.floor(Math.random()*glyphs.length)],i*FS,y-FS);
    if(y>H&&Math.random()>.975)drops[i]=0;
    drops[i]+=0.55;
  }
  requestAnimationFrame(step);
}
addEventListener('resize',rs);rs();step();
</script></body></html>
